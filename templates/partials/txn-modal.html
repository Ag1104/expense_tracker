<div class="modal-overlay" id="txn-modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Transaction</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-txn-id" />

      <div class="type-toggle">
        <button class="type-btn active" data-type="debit">Debit (Expense)</button>
        <button class="type-btn" data-type="credit">Credit (Income)</button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Amount (₦) *</label>
          <input type="number" id="txn-amount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="txn-date" />
        </div>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="txn-category">
          <option value="">Select category...</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description (optional)</label>
        <input type="text" id="txn-description" placeholder="e.g. Lunch at Chicken Republic" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="cancel-btn">Cancel</button>
      <button class="btn-primary" id="save-txn-btn">Save Transaction</button>
    </div>
  </div>
</div>
